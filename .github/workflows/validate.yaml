name: HACS Validation

on:
  push:
    branches:
      - '*'
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: HACS validation
        uses: hacs/action@main
        with:
          category: plugin
